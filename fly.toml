# Fly.io fallback deploy. Run:
#   fly launch --no-deploy --copy-config --name relevant-priors
#   fly deploy
#
# The machine has enough memory for LightGBM + sklearn without tuning.

app = "relevant-priors"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[http_service.checks.health]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
